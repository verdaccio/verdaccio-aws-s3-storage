name: Node CI

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify CJS output
        run: node -e "const m = require('./lib/index.cjs'); if (!m.S3Database || !m.S3PackageManager) process.exit(1); console.log('CJS OK');"

      - name: Verify ESM output (static check)
        run: |
          # Runtime ESM import fails due to @verdaccio/core using pseudoRandomBytes
          # named export from node:crypto which is unavailable in Node 24 ESM.
          # Verify the ESM bundle structure statically instead.
          node -e "
            const fs = require('fs');
            const esm = fs.readFileSync('./lib/index.js', 'utf8');
            if (!esm.includes('S3Database') || !esm.includes('S3PackageManager')) process.exit(1);
            if (!esm.includes('export {')) process.exit(1);
            console.log('ESM bundle verified (static check)');
          "

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Docker image
        run: docker compose build verdaccio

      - name: Start services
        run: docker compose up -d

      - name: Wait for Verdaccio
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:4873/-/ping > /dev/null 2>&1 && echo "Verdaccio ready" && exit 0
            sleep 2
          done
          docker compose logs verdaccio
          exit 1

      - name: Verify plugin loaded
        run: docker compose logs verdaccio 2>&1 | grep -q "verdaccio-aws-s3-storage successfully loaded"

      - name: E2E - publish and fetch a package
        run: |
          TOKEN=$(curl -sf -X PUT http://localhost:4873/-/user/org.couchdb.user:test \
            -H 'Content-Type: application/json' \
            -d '{"name":"test","password":"test1234"}' | node -e "
              process.stdin.setEncoding('utf8');
              let d='';
              process.stdin.on('data',c=>d+=c);
              process.stdin.on('end',()=>console.log(JSON.parse(d).token))")

          TMPDIR=$(mktemp -d)
          echo '{"name":"ci-test-pkg","version":"1.0.0"}' > "$TMPDIR/package.json"
          cd "$TMPDIR"
          npm publish --registry http://localhost:4873 --//localhost:4873/:_authToken="$TOKEN"

          RESULT=$(curl -sf http://localhost:4873/ci-test-pkg | node -e "
            process.stdin.setEncoding('utf8');
            let d='';
            process.stdin.on('data',c=>d+=c);
            process.stdin.on('end',()=>console.log(JSON.parse(d).name))")

          [ "$RESULT" = "ci-test-pkg" ] && echo "E2E passed" || { echo "E2E failed"; exit 1; }

      - name: Stop services
        if: always()
        run: docker compose down -v
