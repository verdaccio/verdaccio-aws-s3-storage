name: Node CI

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Verify ESM output
        run: |
          node -e "
            import('fs').then(fs => {
              const esm = fs.readFileSync('./lib/index.js', 'utf8');
              if (!esm.includes('S3Database') || !esm.includes('S3PackageManager')) process.exit(1);
              if (!esm.includes('export {')) process.exit(1);
              console.log('ESM bundle verified');
            });
          "

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Cypress binary
        run: pnpm cypress install

      - name: Build Docker image
        run: docker compose build verdaccio

      - name: Start services
        run: docker compose up -d

      - name: Wait for Verdaccio
        run: |
          for i in $(seq 1 30); do
            pnpm verdaccioctl ping -r http://localhost:4873 && exit 0
            sleep 2
          done
          docker compose logs verdaccio
          exit 1

      - name: Verify plugin loaded
        run: |
          # Give verdaccio a moment to log all startup messages
          sleep 5
          docker compose logs verdaccio 2>&1
          docker compose logs verdaccio 2>&1 | grep -q "aws-s3-storage"

      - name: E2E - login, publish and fetch a package
        run: |
          pnpm verdaccioctl login -u test -p test1234 -r http://localhost:4873
          pnpm verdaccioctl whoami -r http://localhost:4873

          TMPDIR=$(mktemp -d)
          echo '{"name":"ci-test-pkg","version":"1.0.0"}' > "$TMPDIR/package.json"
          cd "$TMPDIR"
          npm publish --registry http://localhost:4873

      - name: E2E UI - publish tests (Cypress)
        run: pnpm e2e:ui:run
        env:
          VERDACCIO_URL: http://localhost:4873

      - name: Upload Cypress artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-artifacts
          path: |
            cypress/videos
            cypress/screenshots
          retention-days: 7

      - name: Stop services
        if: always()
        run: docker compose down -v
