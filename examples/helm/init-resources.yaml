apiVersion: batch/v1
kind: Job
metadata:
  name: init-aws-resources
  namespace: localstack
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: amazon/aws-cli:latest
          env:
            - name: AWS_ACCESS_KEY_ID
              value: test
            - name: AWS_SECRET_ACCESS_KEY
              value: test
            - name: AWS_DEFAULT_REGION
              value: us-east-1
          command:
            - /bin/sh
            - -c
            - |
              ENDPOINT=http://localstack.localstack.svc.cluster.local:4566

              echo "Waiting for LocalStack..."
              until curl -sf "$ENDPOINT/_localstack/health" | grep -q '"s3"'; do
                sleep 2
              done
              echo "LocalStack ready."

              echo "Creating S3 bucket..."
              aws --endpoint-url "$ENDPOINT" s3 mb s3://verdaccio-storage 2>/dev/null || echo "Bucket exists"

              echo "Creating DynamoDB table..."
              aws --endpoint-url "$ENDPOINT" dynamodb create-table \
                --table-name verdaccio-registry \
                --attribute-definitions \
                  AttributeName=pk,AttributeType=S \
                  AttributeName=sk,AttributeType=S \
                --key-schema \
                  AttributeName=pk,KeyType=HASH \
                  AttributeName=sk,KeyType=RANGE \
                --billing-mode PAY_PER_REQUEST 2>/dev/null || echo "Table exists"

              echo "Done."
