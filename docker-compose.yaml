services:
  localstack:
    image: localstack/localstack:4.4
    container_name: localstack
    environment:
      - SERVICES=s3,dynamodb
      - DEFAULT_REGION=us-east-1
      - DEBUG=0
    ports:
      - '4566:4566'
    volumes:
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:4566/_localstack/health']
      interval: 5s
      timeout: 5s
      retries: 10

  init-resources:
    image: amazon/aws-cli:latest
    container_name: init-resources
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "Creating S3 bucket..."
        aws --endpoint-url http://localstack:4566 s3 mb s3://verdaccio-storage 2>/dev/null || true

        echo "Creating DynamoDB table..."
        aws --endpoint-url http://localstack:4566 dynamodb create-table \
          --table-name verdaccio-registry \
          --attribute-definitions \
            AttributeName=pk,AttributeType=S \
            AttributeName=sk,AttributeType=S \
          --key-schema \
            AttributeName=pk,KeyType=HASH \
            AttributeName=sk,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST 2>/dev/null || true

        echo "Resources ready."

  verdaccio:
    container_name: verdaccio
    build: .
    depends_on:
      localstack:
        condition: service_healthy
      init-resources:
        condition: service_completed_successfully
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_S3_BUCKET=verdaccio-storage
      - AWS_S3_KEY_PREFIX=packages
      - AWS_S3_ENDPOINT=http://localstack:4566
      - AWS_DYNAMO_TABLE_NAME=verdaccio-registry
      - AWS_DYNAMO_ENDPOINT=http://localstack:4566
      - DEBUG=verdaccio:plugin*
    ports:
      - '4873:4873'

volumes:
  localstack-data:
